diarizer:
  manifest_filepath: null
  out_dir: /data/out

  vad:
    model_path: vad_multilingual_marblenet
    parameters:
      window_length_in_sec: 0.15
      shift_length_in_sec: 0.01
      smoothing: true
      overlap: 0.875
      onset: 0.5
      offset: 0.5
      pad_onset: 0.1
      pad_offset: 0.1
      min_duration_on: 0.2
      min_duration_off: 0.2

  speaker_embeddings:
  #modello riconoscimento speaker large/small/base
    model_path: titanet_small
    parameters:
      window_length_in_sec: 1.5
      shift_length_in_sec: 0.75
      multiscale_weights: [1.0]

  clustering:
    parameters:
      oracle_num_speakers: false
      max_num_speakers: 8
      min_num_speakers: 1