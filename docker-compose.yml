version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: n8n_stack_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TZ}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./postgres_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: n8n_stack_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: n8n_stack_qdrant
    restart: unless-stopped
    volumes:
      - ./qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  ollama:
    image: ollama/ollama:latest
    container_name: n8n_stack_ollama
    restart: unless-stopped
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  minio:
    image: minio/minio:latest
    container_name: n8n_stack_minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_stack
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "5678:5678"
    environment:
      - TZ=${TZ}
      - NODE_ENV=production
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_SECURE_COOKIE=false
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
    volumes:
      - ./n8n_data:/home/node/.n8n

  # ── WhisperX API ──────────────────────────────────────────────────────────
  # Riceve upload, crea job su Redis, espone polling.
  # NON carica modelli — nessun parametro Whisper/HF/Torch necessario.
  whisperx_api:
    build:
      context: .
      dockerfile: whisperx/dockerfile.whisperx
    container_name: n8n_whisperx_api
    restart: unless-stopped
    platform: linux/arm64
    command:
      - bash
      - -lc
      - |
        mkdir -p /app/data
        exec uvicorn wx_api:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      - TZ=${TZ}
      - REDIS_URL=redis://redis:6379/0
      - WX_QUEUE_KEY=wx:queue
      - WX_DATA_DIR=/app/data
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=wx-transcriptions
      - MINIO_SECURE=false
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=${POSTGRES_DB}
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./data/uploads:/app/data
      - ./whisperx/wx_api.py:/app/wx_api.py:ro
    ports:
      - "9200:8000"
    depends_on:
      - redis
      - postgres
      - minio

  # ── WhisperX Worker ───────────────────────────────────────────────────────
  # Carica faster-whisper + pyannote UNA VOLTA all'avvio.
  # Consuma la coda Redis, trascrive, diarizza, salva su MinIO e PostgreSQL.
  whisperx_worker:
    build:
      context: .
      dockerfile: whisperx/dockerfile.whisperx
    container_name: n8n_whisperx_worker
    restart: unless-stopped
    platform: linux/arm64
    command:
      - bash
      - -lc
      - |
        mkdir -p /app/data/in /app/data/out
        exec python wx_worker.py
    environment:
      - TZ=${TZ}
      - REDIS_URL=redis://redis:6379/0
      - WX_QUEUE_KEY=wx:queue
      - WX_DATA_DIR=/app/data
      - WX_BLPOP_TIMEOUT=5
      - WX_STALE_SEC=2700
      # Modello Whisper
      - WHISPER_MODEL=small
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8_float16
      # HuggingFace — necessario per scaricare pyannote
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/app/wx_models
      - TRANSFORMERS_CACHE=/app/wx_models
      - TORCH_HOME=/app/wx_models/torch
      - NLTK_DATA=/usr/local/share/nltk_data
      # Storage
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=wx-transcriptions
      - MINIO_SECURE=false
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=${POSTGRES_DB}
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      # Thread — ottimizzati per singolo processo su ARM
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=1
      - TOKENIZERS_PARALLELISM=false
      - NNPACK=0
    volumes:
      - ./data/uploads:/app/data
      - ./data/whisper_models:/app/wx_models
      - ./data/nltk_data:/usr/local/share/nltk_data
      - ./whisperx/wx_worker.py:/app/wx_worker.py:ro
    depends_on:
      - redis
      - postgres
      - minio
      - whisperx_api

  webform:
    image: nginx:alpine
    container_name: n8n_stack_webform
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./webform:/usr/share/nginx/html:ro

  nemo_api:
    build:
      context: .
      dockerfile: nemo/dockerfile.nemo
    profiles: [nemo]
    container_name: n8n_nemo_api
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - REDIS_URL=redis://redis:6379/0
      - NEMO_QUEUE_KEY=nemo:queue
      - NEMO_ASR_MODEL=${NEMO_ASR_MODEL}
    volumes:
      - ./data/nemo:/data
    ports:
      - "9300:8000"
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    depends_on:
      - redis

  nemo_worker:
    build:
      context: .
      dockerfile: nemo/dockerfile.nemo
    profiles: [nemo]
    container_name: n8n_nemo_worker
    platform: linux/amd64
    restart: no
    environment:
      - TZ=${TZ}
      - REDIS_URL=redis://redis:6379/0
      - NEMO_QUEUE_KEY=nemo:queue
      - NEMO_ASR_MODEL=${NEMO_ASR_MODEL}
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
      - TORCH_NUM_THREADS=1
      - TORCH_NUM_INTEROP_THREADS=1
      - TOKENIZERS_PARALLELISM=false
      - TORCH_HOME=/models-cache
      - XDG_CACHE_HOME=/models-cache
    volumes:
      - ./data/nemo:/data
      - ./data/nemo_cache:/root/.cache/torch
      - ./data/nemo_models_cache:/models-cache
    command: ["python", "/app/worker.py"]
    depends_on:
      - redis
      - nemo_api