version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: n8n_stack_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TZ}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./postgres_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10


  redis:
    image: redis:7-alpine
    container_name: n8n_stack_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: n8n_stack_qdrant
    restart: unless-stopped
    volumes:
      - ./qdrant_data:/qdrant/storage
    ports:
      - "6333:6333" # API HTTP (se ti serve da host)
      - "6334:6334" # gRPC (opzionale)

  ollama:
    image: ollama/ollama:latest
    container_name: n8n_stack_ollama
    restart: unless-stopped
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Se sei su Linux + GPU NVIDIA, qui serve configurazione runtime nvidia (extra)

  # Opzionale: storage S3-compatible per documenti
  minio:
    image: minio/minio:latest
    container_name: n8n_stack_minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_stack
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "5678:5678"
    environment:
      - TZ=${TZ}
      - NODE_ENV=production

      # n8n security
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_SECURE_COOKIE=false

      # DB: Postgres
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}

      # Redis (necessario se usi queue mode / worker; non rompe anche se non lo abiliti)
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379

      # URL interno utile per webhooks dietro reverse-proxy (per ora lasciamo neutro)
      # - N8N_HOST=your-domain.tld
      # - N8N_PROTOCOL=https
      # - WEBHOOK_URL=https://your-domain.tld/

    volumes:
      - ./n8n_data:/home/node/.n8n

  whisperx:
    build:
      context: .
      dockerfile: Dockerfile.whisperx
    container_name: n8n_whisperx
    restart: unless-stopped
    # su Mac Apple Silicon spesso conviene forzare amd64
    platform: linux/amd64

 # crea le directory necessarie sul volume ad ogni avvio
    command:
      - bash
      - -lc
      - |
        mkdir -p /app/wx_models/nltk /app/wx_models/torch /app/wx_models/hf /app/data        
        exec uvicorn entry_async:app --host 0.0.0.0 --port 8000 --workers 5
    environment:
      - WHISPER_DEVICE=cpu
      - WHISPER_THREADS=10
      # pre-carica almeno un modello (puoi mettere: tiny, base, small, medium, large-v3)
      - WHISPER_MODELS=small
      # token per diarization (nome variabile richiesto dall'immagine)
      - WHISPER_HF_TOKEN=${HF_TOKEN}
      - HF_TOKEN=${HF_TOKEN}
      - HUGGINGFACE_TOKEN=${HF_TOKEN}
      - TZ=${TZ}
      - HF_HUB_OFFLINE=0
      - TRANSFORMERS_OFFLINE=0
      - HF_HOME=/app/wx_models
      - TRANSFORMERS_CACHE=/app/wx_models
      - NLTK_DATA=/usr/local/share/nltk_data
      - TORCH_HOME=/app/wx_models/torch
      - NNPACK=0 
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=n8n-minute
      - MINIO_SECURE=false
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=n8n
      - PGUSER=n8n
      - PGPASSWORD=ChangeMe_DB
      - REDIS_HOST=redis
      - REDIS_PORT=6379

    volumes:
      - ./data/uploads:/app/data
      - ./data/whisper_models:/app/wx_models
      - ./data/nltk_data:/usr/local/share/nltk_data
    ports:
      - "9200:8000"


  webform:
    image: nginx:alpine
    container_name: n8n_stack_webform
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./webform:/usr/share/nginx/html:ro


  nemo_api:
    build:
      context: .
      dockerfile: nemo/Dockerfile
    container_name: n8n_nemo_api
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - REDIS_URL=redis://redis:6379/0
      - NEMO_QUEUE_KEY=nemo:queue
      - NEMO_ASR_MODEL=stt_multilingual_fastconformer_hybrid_large
    volumes:
      - ./data/nemo:/data
    ports:
      - "9300:8000"
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    depends_on:
      - redis

  nemo_worker:
    build:
      context: .
      dockerfile: nemo/Dockerfile
    container_name: n8n_nemo_worker
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - REDIS_URL=redis://redis:6379/0
      - NEMO_QUEUE_KEY=nemo:queue
      - NEMO_ASR_MODEL=stt_multilingual_fastconformer_hybrid_large
    volumes:
      - ./data/nemo:/data
    command: ["python", "/app/worker.py"]
    depends_on:
      - redis
      - nemo_api

